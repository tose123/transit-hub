name: Update star history

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - scripts/update-star-history.mjs
      - .github/workflows/update-star-history.yml

permissions:
  contents: write

concurrency:
  group: update-star-history-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-star-history:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Verify Node 22
        run: |
          node --version
          node -e "const major = Number(process.versions.node.split('.')[0]); if (major !== 22) throw new Error(`Expected Node 22, got ${process.version}`);"

      - name: Generate star history SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: deviseo/transit-hub
        run: node scripts/update-star-history.mjs

      - name: Commit generated assets
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/star-history-light.svg docs/assets/star-history-dark.svg
          if git diff --cached --quiet; then
            echo "Star history assets are already current."
            exit 0
          fi
          git commit -m "Update star history charts"
          git push
