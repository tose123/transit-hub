# TransitHub 生产部署示例。
# 部署前必须修改所有 change-this-* 占位值，并确认镜像地址和版本号正确。
services:
  # TransitHub 应用服务：包含 Go 后端和已构建的前端静态文件。
  app:
    # 发布部署必须使用与代码内置版本号一致的固定镜像 tag。
    image: ghcr.io/tose123/transit-hub:v26.7.130016
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      # 左侧 10621 是宿主机访问端口，可按需修改；右侧 10621 是容器内服务端口。
      - "10621:10621"
    environment:
      PORT: "10621"
      # PostgreSQL 连接串。这里的密码必须和 postgres.POSTGRES_PASSWORD 保持一致。
      DATABASE_URL: postgres://transithub:change-this-db-password@postgres:5432/transithub?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      # 首次空库启动时自动创建的管理员账号。已有用户时不会覆盖密码。
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: change-this-admin-password
      # 生产环境建议关闭公开注册，只允许使用初始化管理员登录。
      ALLOW_PUBLIC_REGISTER: "false"
      # 工单图片附件本地存储目录，必须和下方 volumes 挂载的容器内路径完全一致，
      # 否则容器重建后图片文件会丢失（数据库里的附件 metadata 不受影响）。
      TICKET_UPLOAD_DIR: /app/data/ticket-uploads
      # 可选：SMTP 密码加密密钥，仅当需要在「系统设置 - 邮件设置」中保存 SMTP 密码或发送测试邮件时才需要配置。
      # 缺失不影响应用启动，也不影响 SMTP 之外的功能。用 `openssl rand -base64 32` 生成一个 base64 编码的
      # 32 字节随机值；生成后必须长期稳定保存——更换 key 后，旧的 SMTP 密码密文将无法解密，需要重新填写密码。
      # SMTP_ENCRYPTION_KEY: change-this-to-a-generated-base64-32-byte-key
    volumes:
      # 持久化工单图片附件；不要挂载到 /app/public 之下，避免变成公开静态目录。
      - ../data/ticket-uploads:/app/data/ticket-uploads

  # PostgreSQL 数据库服务。
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: transithub
      POSTGRES_USER: transithub
      # 必须修改，并同步到 app.environment.DATABASE_URL 中。
      POSTGRES_PASSWORD: change-this-db-password
    volumes:
      # 持久化数据库数据。
      - ../data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U transithub -d transithub"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 服务：用于后台会话、缓存和定时刷新任务。
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      # 持久化 Redis 数据。
      - ../data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
